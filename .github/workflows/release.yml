# Inspired by https://docs.astral.sh/uv/guides/integration/github/#publishing-to-pypi

name: Release & publish
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
